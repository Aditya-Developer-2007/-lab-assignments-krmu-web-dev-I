<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(61, 61, 255);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: white;
        }
        .container {
            width: 80%;
            height: 50vh;
            margin: auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .card {
            width: 47%;
            height: 90%;
            background-color: aliceblue;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .search-controls {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }
        #city-input {
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 20px;
            height: 35px;
            padding-left: 20px;
            font-size: 16px;
            outline: none;
        }
        #search-btn {
            width: 25%;
            height: 35px;
            border-radius: 20px;
            border: none;
            background-color: rgb(61, 61, 255);
            color: white;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        #search-btn:hover {
            background-color: rgb(40, 40, 200);
        }
        .history-container {
            width: 80%;
            margin: 20px auto;
            background-color: aliceblue;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            min-height: 20vh;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0;
            list-style: none;
        }
        .history-item {
            background-color: #ddd;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .history-item:hover {
            background-color: #bbb;
        }
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .weather-header h2 {
            margin: 0;
            font-size: 26px;
            color: #333;
        }
        .weather-temp {
            font-size: 54px;
            font-weight: bold;
            color: rgb(61, 61, 255);
            text-align: center;
            margin: 10px 0;
        }
        .weather-desc {
            text-align: center;
            font-size: 20px;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 25px;
        }
        .weather-stats {
            display: flex;
            justify-content: space-around;
            background-color: #f0f4f8;
            border-radius: 15px;
            padding: 15px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Async Weather App</h1>
    <div class="container">
        <div class="card">
            <p style="font-size: 22px; font-weight: 700; margin-top: 0;">Search City</p>
            <div class="search-controls">
                <input type="text" id="city-input" placeholder="Enter your city...">
                <button id="search-btn">Search</button>
            </div>
        </div>
        <div id="weather-result" class="card">
            <p style="text-align: center; color: gray; margin-top: 20%;">Weather details will appear here</p>
        </div>
    </div>
    <div class="history-container">
        <h2 style="margin-top: 0; font-size: 22px;">Search History</h2>
        <ul id="history-list" class="history-list">
            <li style="color: gray;">No history yet.</li>
        </ul>
    </div>
    <script>
        let API="5c6a091a880a3e3a0153aac2a2069f03";
        let searchHistory = [];
        
        document.getElementById("search-btn").addEventListener("click", async () => {
            const city = document.getElementById("city-input").value.trim();
            if (!city) {
                alert("Please enter a city name.");
                return;
            }
            await getWeatherInfo(city);
        });

        async function getWeatherInfo(city) {
            try {
                let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API}&units=metric`);
                if (!response.ok) throw new Error("City not found");
                let data = await response.json();
                
                const resultDiv = document.getElementById("weather-result");
                resultDiv.innerHTML = `
                    <div class="weather-header">
                        <h2>${data.name}</h2>
                        <span style="background: rgb(61,61,255); color: white; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 14px;">${data.sys.country}</span>
                    </div>
                    <div class="weather-temp">${Math.round(data.main.temp)}°C</div>
                    <div class="weather-desc">${data.weather[0].description}</div>
                    <div class="weather-stats">
                        <div class="stat-item">
                            <div class="stat-label">Humidity</div>
                            <div class="stat-value">${data.main.humidity}%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Wind Speed</div>
                            <div class="stat-value">${data.wind.speed} m/s</div>
                        </div>
                    </div>
                `;

                addToHistory(data.name);
            } catch (error) {
                console.error("Error fetching weather:", error);
                alert("City not found. Please try again.");
            }
        }

        function addToHistory(cityName) {
            const index = searchHistory.indexOf(cityName);
            if (index !== -1) {
                searchHistory.splice(index, 1);
            }
            searchHistory.unshift(cityName);
            if (searchHistory.length > 10) {
                searchHistory.pop(); // Keep only the last 10 entries
            }
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const historyList = document.getElementById("history-list");
            historyList.innerHTML = "";

            searchHistory.forEach(city => {
                const li = document.createElement("li");
                li.className = "history-item";
                li.textContent = city;
                li.addEventListener("click", () => {
                    document.getElementById("city-input").value = city;
                    getWeatherInfo(city);
                });
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
