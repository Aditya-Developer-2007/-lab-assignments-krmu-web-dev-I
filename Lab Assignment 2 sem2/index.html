<body>
  <div class="container">
    <h1>Async Weather App By Aditya Saini </h1>
    <input type="text" id="city-input" placeholder="Enter your city..." />
    <button id="search-btn">Search </button>
    <div class="weather-result" id="weather-result">
      <h2 id="city-name"></h2>
      <p id="temp"></p>
      <p id="desc"></p>
      <p id="humid"></p>
      <p id="wind"></p>
    </div>
  </div>

  <script>
    document.getElementById("search-btn").addEventListener("click", async () => {
      const city = document.getElementById("city-input").value.trim();
      if (!city) {
        alert("Please enter a city name.");
        return;
      }

      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=d82f8764bc6060b4285be5828e546061`);
        if (!res.ok) throw new Error("City not found");

        const data = await res.json();
        document.getElementById("city-name").textContent = ` ${data.name}`;
        document.getElementById("temp").textContent = ` Temperature: ${(data.main.temp - 273.15).toFixed(1)}°C`;
        document.getElementById("desc").textContent = ` ${data.weather[0].description}`;
        document.getElementById("humid").textContent = ` Humidity: ${data.main.humidity}%`;
        document.getElementById("wind").textContent = ` Wind Speed: ${data.wind.speed} m/s`;

        document.getElementById("weather-result").style.display = "block";
      } catch (error) {
        alert(" City not found. Try again.");
        document.getElementById("weather-result").style.display = "none";
      }
    });
  </script>
</body>
