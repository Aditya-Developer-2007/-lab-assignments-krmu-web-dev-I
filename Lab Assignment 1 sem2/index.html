<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Saini</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #334155;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --radius: 12px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 2.5rem;
            text-align: center;
            letter-spacing: -0.025em;
        }

        h2, h3 {
            color: #1e293b;
            font-weight: 600;
            margin-top: 0;
        }

        #main-event-add-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 480px;
            margin-bottom: 3rem;
        }

        form { display: flex; flex-direction: column; }
        
        label { 
            font-size: 0.875rem; 
            font-weight: 500; 
            margin-bottom: 0.5rem; 
            color: #475569; 
        }
        
        input, select, textarea {
            padding: 0.75rem 1rem; 
            border: 1px solid var(--border); 
            border-radius: 8px;
            margin-bottom: 1.25rem; 
            font-size: 0.95rem; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.2s ease; 
            font-family: inherit;
            background-color: #f8fafc;
            color: #1e293b;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none; 
            border-color: var(--accent); 
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        textarea { resize: none; min-height: 100px; }
        form br { display: none; }

        button { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            transition: all 0.2s; 
            font-family: inherit;
        }
        
        form button[type="submit"] {
            background-color: var(--primary); 
            color: white; 
            padding: 0.875rem; 
            font-size: 1rem; 
            margin-top: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.1);
        }
        form button[type="submit"]:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }

        .events-wrapper { width: 100%; max-width: 1000px; }
        
        #bttn-container { display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: flex-end; }
        #bttn-container button { 
            background-color: white; 
            border: 1px solid var(--border); 
            padding: 0.6rem 1.2rem; 
            color: var(--text); 
            font-size: 0.875rem;
        }
        #bttn-container button:hover { 
            background-color: #f1f5f9; 
            border-color: #cbd5e1; 
            color: #0f172a;
        }

        #all-events-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; width: 100%; }
        
        .event-card {
            background: var(--surface); 
            padding: 1.75rem; 
            border-radius: var(--radius);
            box-shadow: var(--shadow); 
            border: 1px solid var(--border); 
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .event-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .event-card h4 { 
            margin: 0 0 0.75rem 0; 
            font-size: 1.125rem; 
            font-weight: 700;
            color: #0f172a; 
            padding-right: 2rem; 
        }
        .event-card .meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .event-card .category-badge {
            background-color: #eff6ff;
            color: #2563eb;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.7rem;
        }
        .event-card .date {
            color: var(--text-light);
        }
        .event-card p { 
            margin: 0; 
            font-size: 0.925rem; 
            line-height: 1.6; 
            color: #475569; 
            flex-grow: 1;
        }
        .event-card button {
            position: absolute; 
            top: 1.25rem; 
            right: 1.25rem; 
            background: transparent; 
            color: #cbd5e1;
            width: 28px; 
            height: 28px; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px;
            font-size: 1.2rem;
        }
        .event-card button:hover { 
            background-color: #fef2f2; 
            color: var(--danger); 
        }
    </style>
</head>
<body>
    <h1>Smart Event Dashboard</h1>
    <div id="main-event-add-container">
        <h2>Add New Event</h2>
        <form action="">
            <label for="EventTitle">Event Title:</label>
            <input type="text" id="EventTitle" required>
            <br><br>
            <label for="EventDate">Event Date:</label>
            <input type="date" id="EventDate" required>
            <br><br>
            <label for="EventCategory">Category:</label>
            <select name="" id="EventCategory" required>
                <option value="Conference">Conference</option>
                <option value="Workshop">Workshop</option>
                <option value="Meetup">Meetup</option>
                <option value="Webinar">Webinar</option>
                <option value="Social">Social</option>
            </select>
            <br><br>
            <label for="EventDescription">Description:</label>
            <textarea name="" id="EventDescription" required></textarea>
            <!-- css me resize krke null krdena taki bada chota na ho -->
            <br><br>
            <button type="submit">Add Event</button>

        </form>
    </div>

    <div class="events-wrapper">
        <h3>MY EVENTS</h3>
        <div id="bttn-container">
            <button id="clear-event-btn">Clear All Events</button>
            <button id="add-sample-event">Add Sample Events</button>
        </div>
        <div id="all-events-container">
            No Events Yet.
        </div>
    </div>

    <script>
        let form = document.querySelector('form')
        let EventDate = document.querySelector('#EventDate')
        let EventTitle = document.querySelector('#EventTitle')
        let EventCategory = document.querySelector('#EventCategory')
        let EventDescription = document.querySelector('#EventDescription')
        let alleventscontainer = document.querySelector('#all-events-container')
        let clearallevents = document.querySelector('#clear-event-btn')
        function addEventFunction(event){
            event.preventDefault()
            let card = document.createElement('div')
            card.className = 'event-card'
            card.innerHTML = `<button>&times;</button>
                                <h4>${EventTitle.value}</h4>
                                <div class="meta">
                                    <span class="category-badge">${EventCategory.value}</span>
                                    <span class="date">${EventDate.value}</span>
                                </div>
                                <p>${EventDescription.value}</p>`

        // alleventscontainer.innerHTML = "";

        alleventscontainer.append(card);

        form.reset()
        }

        function clearalleventfunction(){
            alleventscontainer.innerHTML = `<h4>No Events Yet</h4>`

        }

    

        form.addEventListener('submit', addEventFunction)

        clearallevents.addEventListener('click' , clearalleventfunction)
    </script>
</body>
</html>
