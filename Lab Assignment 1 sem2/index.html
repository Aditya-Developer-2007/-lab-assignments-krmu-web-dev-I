<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Saini</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
        }

        h1 {
            color: #0f172a;
            text-align: center;
            width: 100%;
            margin-bottom: 40px;
        }

        h2, h3 {
            color: #1e293b;
            margin-top: 0;
        }

        /* Form Container */
        #main-event-add-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 480px;
            margin-bottom: 0;
            box-sizing: border-box;
        }

        form {
            display: flex;
            flex-direction: column;
        }
        
        label { 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #475569; 
        }
        
        input, select, textarea {
            padding: 10px; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px;
            margin-bottom: 15px; 
            font-size: 16px; 
            width: 100%; 
            box-sizing: border-box;
            font-family: inherit;
            background-color: #f8fafc;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none; 
            border-color: #3b82f6; 
            background-color: white;
        }
        
        textarea { 
            resize: none; 
            min-height: 100px; 
        }
        
        /* Hide the br tags in form since we use flexbox */
        form br { display: none; }

        button { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-family: inherit;
        }
        
        /* Add Event Button */
        form button {
            background-color: #0f172a; 
            color: white; 
            padding: 12px; 
            font-size: 16px; 
            margin-top: 10px;
        }
        
        form button:hover { 
            background-color: #334155; 
        }

        .events-wrapper { 
            width: 100%; 
            max-width: 1000px; 
            flex: 1;
            min-width: 300px;
        }
        
        #bttn-container { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            justify-content: flex-end; 
        }
        
        #bttn-container button { 
            background-color: white; 
            border: 1px solid #e2e8f0; 
            padding: 8px 16px; 
            color: #334155; 
        }
        
        #bttn-container button:hover { 
            background-color: #f1f5f9; 
        }

        #all-events-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%; 
        }
        
        .event-card {
            background-color: white; 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e2e8f0; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .event-card:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        .event-card h4 { 
            margin: 0 0 10px 0; 
            font-size: 18px; 
            color: #0f172a; 
            padding-right: 30px; 
        }
        .event-card .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .event-card .category-badge {
            background-color: #eff6ff;
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
        .event-card .date {
            color: #64748b;
        }
        .event-card p { 
            margin: 0; 
            line-height: 1.6; 
            color: #475569; 
        }
        .event-card button {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: transparent; 
            color: #cbd5e1;
            padding: 0; 
            font-size: 24px;
        }
        .event-card button:hover { 
            color: #ef4444; 
        }
    </style>
</head>
<body>
    <h1>Smart Event Dashboard</h1>
    <div id="main-event-add-container">
        <h2>Add New Event</h2>
        <form action="">
            <label for="EventTitle">Event Title:</label>
            <input type="text" id="EventTitle" required>
            <br><br>
            <label for="EventDate">Event Date:</label>
            <input type="date" id="EventDate" required>
            <br><br>
            <label for="EventCategory">Category:</label>
            <select name="" id="EventCategory" required>
                <option value="Conference">Conference</option>
                <option value="Workshop">Workshop</option>
                <option value="Meetup">Meetup</option>
                <option value="Webinar">Webinar</option>
                <option value="Social">Social</option>
            </select>
            <br><br>
            <label for="EventDescription">Description:</label>
            <textarea name="" id="EventDescription" required></textarea>
            <!-- css me resize krke null krdena taki bada chota na ho -->
            <br><br>
            <button type="submit">Add Event</button>

        </form>
    </div>

    <div class="events-wrapper">
        <h3>MY EVENTS</h3>
        <div id="bttn-container">
            <button id="clear-event-btn">Clear All Events</button>
            <button id="add-sample-event">Add Sample Events</button>
        </div>
        <div id="all-events-container">
            No Events Yet.
        </div>
    </div>

    <script>
        let form = document.querySelector('form')
        let EventDate = document.querySelector('#EventDate')
        let EventTitle = document.querySelector('#EventTitle')
        let EventCategory = document.querySelector('#EventCategory')
        let EventDescription = document.querySelector('#EventDescription')
        let alleventscontainer = document.querySelector('#all-events-container')
        let clearallevents = document.querySelector('#clear-event-btn')
        let addSampleBtn = document.querySelector('#add-sample-event')

        // Function to create a new card
        function createCard(title, date, category, desc) {
            // If the container has the "No Events" text, clear it first
            if (!alleventscontainer.querySelector('.event-card')) {
                alleventscontainer.innerHTML = ''
            }

            let card = document.createElement('div')
            card.className = 'event-card'
            card.innerHTML = `<button>&times;</button>
                                <h4>${title}</h4>
                                <div class="meta">
                                    <span class="category-badge">${category}</span>
                                    <span class="date">${date}</span>
                                </div>
                                <p>${desc}</p>`
            
            // Add delete functionality to the button inside the card
            card.querySelector('button').addEventListener('click', function() {
                card.remove()
                // If no cards are left, show the "No Events" message
                if (alleventscontainer.children.length === 0) {
                    alleventscontainer.innerHTML = 'No Events Yet.'
                }
            })

            alleventscontainer.append(card)
        }

        function addEventFunction(event) {
            event.preventDefault()
            createCard(EventTitle.value, EventDate.value, EventCategory.value, EventDescription.value)
            form.reset()
        }

        function clearalleventfunction() {
            alleventscontainer.innerHTML = 'No Events Yet.'
        }

        function addSampleEvents() {
            createCard('Web Dev Workshop', '2025-03-15', 'Workshop', 'Learning HTML, CSS, and JS basics.')
            createCard('Tech Meetup', '2025-04-20', 'Meetup', 'Networking with local developers.')
        }

        form.addEventListener('submit', addEventFunction)
        clearallevents.addEventListener('click', clearalleventfunction)
        addSampleBtn.addEventListener('click', addSampleEvents)
    </script>
</body>
</html>
